<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Your Book List</title>
</head>
<body>
    <h1>You Can Store our Book Here!</h1>
    <button type="button" id="open">+ Add New Book</button>
    <div class="list"></div>

    <dialog class="modal">
        <form>
            <label for="author_name">Author Name:</label>
            <input type="text" id="author_name" name="Author_name" required>
            <label for="book_name">Book Name:</label>
            <input type="text" id="book_name" name="Book_name" required>
            <label for="numberofpages">Number of Pages:</label>
            <input type="text" id="numberofpages" name="Numberofpages" required>
            <h3>Have You Read?</h3>
            <div class="radio_group">
                <input type="radio" id="yes" name="read_status" value="yes" required>
                <label for="yes" class="radio_label">Yes</label>

                <input type="radio" id="no" name="read_status" value="no">
                <label for="no" class="radio_label">No</label>

            </div>
            <div class="close_button">
                <button type="submit" id="submitBook">Add to Library</button>
                <button type="button" id="close">Cancel</button>
            </div>
        </form>
    </dialog>
</body>
</html>
